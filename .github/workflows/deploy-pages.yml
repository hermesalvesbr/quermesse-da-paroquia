name: Deploy Pages

on:
  push:
    branches:
      - main
    paths:
      - 'public/releases/index.html'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare GitHub Pages site
        run: |
          mkdir -p dist
          cp public/releases/index.html dist/index.html

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
