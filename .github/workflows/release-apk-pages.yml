name: Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK Licenses
        run: yes | sdkmanager --licenses || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install NativeScript CLI
        run: bun install -g nativescript

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build Android APK
        run: ns build android --env.skipTypeCheck

      - name: Prepare APK artifact
        run: |
          mkdir -p artifacts/apk
          cp platforms/android/app/build/outputs/apk/debug/app-debug.apk "artifacts/apk/quermesse-da-paroquia-${GITHUB_REF_NAME}.apk"
          cp platforms/android/app/build/outputs/apk/debug/app-debug.apk artifacts/apk/quermesse-da-paroquia-latest.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/apk/quermesse-da-paroquia-${{ github.ref_name }}.apk
            artifacts/apk/quermesse-da-paroquia-latest.apk
          generate_release_notes: true
