name: Release APK + Pages

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build Android APK
        run: bunx ns build android

      - name: Prepare APK artifact
        run: |
          mkdir -p artifacts/apk
          cp platforms/android/app/build/outputs/apk/debug/app-debug.apk "artifacts/apk/quermesse-da-paroquia-${GITHUB_REF_NAME}.apk"
          cp platforms/android/app/build/outputs/apk/debug/app-debug.apk artifacts/apk/quermesse-da-paroquia-latest.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/apk/quermesse-da-paroquia-${{ github.ref_name }}.apk
            artifacts/apk/quermesse-da-paroquia-latest.apk
          generate_release_notes: true

      - name: Prepare GitHub Pages site
        run: |
          mkdir -p dist
          cp public/releases/index.html dist/index.html

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy-pages:
    runs-on: ubuntu-latest
    needs: release
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
